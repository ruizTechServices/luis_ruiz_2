<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Do / don't</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div style="background:#0F172A;border:1px solid rgba(34,197,94,.4);border-radius:14px;padding:14px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#22C55E;margin-bottom:10px">Do</div>
    <div style="font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:#F8FAFC">Turn messy workflows into clean dashboards.</div>
    <div style="margin-top:8px;font-size:11px;color:#94A3B8;font-family:var(--font-mono)">Direct. Concrete. Founder-led.</div>
  </div>
  <div style="background:#0F172A;border:1px solid rgba(239,68,68,.4);border-radius:14px;padding:14px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#EF4444;margin-bottom:10px">Don't</div>
    <div style="font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:#F8FAFC">Unlock revolutionary AI to supercharge your potential.</div>
    <div style="margin-top:8px;font-size:11px;color:#94A3B8;font-family:var(--font-mono)">Hype, generic, no concrete claim.</div>
  </div>
</div></body></html>
