<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Elevation</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;background:#0F172A;padding:24px;border-radius:14px;border:1px solid rgba(255,255,255,.06)">
  <div style="height:74px;background:#111827;border:1px solid rgba(255,255,255,.06);border-radius:12px;box-shadow:0 1px 2px rgba(2,6,23,.3),inset 0 1px 0 rgba(255,255,255,.04);display:flex;align-items:end;padding:10px;font-family:var(--font-mono);font-size:11px;color:#94A3B8">shadow-xs</div>
  <div style="height:74px;background:#111827;border:1px solid rgba(255,255,255,.06);border-radius:12px;box-shadow:0 2px 6px rgba(2,6,23,.5),inset 0 1px 0 rgba(255,255,255,.04);display:flex;align-items:end;padding:10px;font-family:var(--font-mono);font-size:11px;color:#94A3B8">shadow-sm</div>
  <div style="height:74px;background:#111827;border:1px solid rgba(255,255,255,.06);border-radius:12px;box-shadow:0 8px 24px rgba(2,6,23,.6),inset 0 1px 0 rgba(255,255,255,.04);display:flex;align-items:end;padding:10px;font-family:var(--font-mono);font-size:11px;color:#94A3B8">shadow-md</div>
</div>
<div style="margin-top:14px;background:#0F172A;padding:18px;border-radius:14px;border:1px solid rgba(255,255,255,.06)">
<div style="height:60px;background:#0B1220;border:1px solid rgba(94,234,212,.3);border-radius:10px;box-shadow:0 0 0 1px rgba(94,234,212,.3),0 12px 40px rgba(20,184,166,.2);display:flex;align-items:center;padding:14px;font-family:var(--font-mono);font-size:11px;color:#99F6E4">glow-teal — focused panels, AI surfaces</div>
</div></body></html>
