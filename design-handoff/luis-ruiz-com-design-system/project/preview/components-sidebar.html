<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Dashboard sidebar</div>
<div style="display:grid;grid-template-columns:200px 1fr;gap:12px;background:#0F172A;border-radius:14px;padding:8px;border:1px solid rgba(255,255,255,.08);height:240px">
  <nav style="background:#020617;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 8px;display:flex;flex-direction:column;gap:4px">
    <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;padding:6px 8px;font-weight:600">Owner</div>
    
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#CBD5E1;background:transparent;border:1px solid transparent;font-weight:500">
      <i data-lucide="target" style="width:15px;height:15px;color:#94A3B8"></i>Today
    </a>
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#F8FAFC;background:rgba(37,99,235,.15);border:1px solid rgba(56,189,248,.25);font-weight:600">
      <i data-lucide="folder-kanban" style="width:15px;height:15px;color:#7DD3FC"></i>Projects
    </a>
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#CBD5E1;background:transparent;border:1px solid transparent;font-weight:500">
      <i data-lucide="inbox" style="width:15px;height:15px;color:#94A3B8"></i>Leads
    </a>
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#CBD5E1;background:transparent;border:1px solid transparent;font-weight:500">
      <i data-lucide="circle-dollar-sign" style="width:15px;height:15px;color:#94A3B8"></i>Revenue
    </a>
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#CBD5E1;background:transparent;border:1px solid transparent;font-weight:500">
      <i data-lucide="file-text" style="width:15px;height:15px;color:#94A3B8"></i>Content
    </a>
    <a href="#" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;color:#CBD5E1;background:transparent;border:1px solid transparent;font-weight:500">
      <i data-lucide="bot" style="width:15px;height:15px;color:#94A3B8"></i>AI tools
    </a>
  </nav>
  <div style="background:#020617;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px"></div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script></body></html>
