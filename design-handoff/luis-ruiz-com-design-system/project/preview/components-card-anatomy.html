<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Card anatomy — operational panel</div>
<section style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;box-shadow:0 2px 6px rgba(2,6,23,.4),inset 0 1px 0 rgba(255,255,255,.04)">
  <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start">
    <div>
      <div style="font-size:18px;font-weight:600;color:#F8FAFC">Active Projects</div>
      <div style="font-size:13px;color:#94A3B8;margin-top:4px">7 in motion · 2 paused</div>
    </div>
    <span style="height:36px;width:36px;border-radius:10px;background:rgba(94,234,212,.10);display:grid;place-items:center;color:#5EEAD4"><i data-lucide="folder-kanban" style="width:18px;height:18px"></i></span>
  </div>
  <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
    <div style="padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:#F8FAFC;font-weight:600">luis-ruiz.com Master Hub</div>
        <div style="font-size:11px;color:#94A3B8;margin-top:2px">Continue feature-spec loop</div>
      </div>
      <span class="rt-badge" style="background:rgba(94,234,212,.12);color:#5EEAD4">building</span>
    </div>
    <div style="padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:#F8FAFC;font-weight:600">Nucleus API</div>
        <div style="font-size:11px;color:#94A3B8;margin-top:2px">Protect product contract</div>
      </div>
      <span class="rt-badge" style="background:rgba(167,139,250,.14);color:#A78BFA">product track</span>
    </div>
  </div>
</section>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script></body></html>
