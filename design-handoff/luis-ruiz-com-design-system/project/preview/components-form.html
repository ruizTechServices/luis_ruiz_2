<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Form inputs</div>
<div style="display:flex;flex-direction:column;gap:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px">
  <div>
    <label style="font-size:12px;font-weight:600;color:#CBD5E1;display:block;margin-bottom:6px">Project name</label>
    <input value="luis-ruiz.com Master Hub" style="width:100%;height:40px;padding:0 12px;border-radius:8px;background:rgba(2,6,23,.6);border:1px solid rgba(255,255,255,.1);color:#F8FAFC;font:500 14px var(--font-sans);box-sizing:border-box"/>
  </div>
  <div>
    <label style="font-size:12px;font-weight:600;color:#CBD5E1;display:block;margin-bottom:6px">Status</label>
    <div style="position:relative">
      <select style="width:100%;height:40px;padding:0 36px 0 12px;border-radius:8px;background:rgba(2,6,23,.6);border:1px solid rgba(255,255,255,.1);color:#F8FAFC;font:500 14px var(--font-sans);appearance:none;box-sizing:border-box">
        <option>building</option><option>shipped</option><option>paused</option>
      </select>
      <i data-lucide="chevron-down" style="width:16px;height:16px;color:#94A3B8;position:absolute;right:12px;top:12px;pointer-events:none"></i>
    </div>
  </div>
  <div>
    <label style="font-size:12px;font-weight:600;color:#CBD5E1;display:block;margin-bottom:6px">Notes</label>
    <textarea style="width:100%;height:60px;padding:10px 12px;border-radius:8px;background:rgba(2,6,23,.6);border:1px solid #2563EB;color:#F8FAFC;font:400 14px var(--font-sans);box-sizing:border-box;resize:none;outline:0;box-shadow:0 0 0 3px rgba(37,99,235,.20)">Focused state — border #2563EB + 3px ring.</textarea>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script></body></html>
