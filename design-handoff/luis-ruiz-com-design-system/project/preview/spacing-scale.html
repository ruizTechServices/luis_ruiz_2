<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Spacing scale (8px base)</div>
<div style="display:flex;flex-direction:column;gap:8px">
  
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-1</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">4px</div>
    <div style="height:14px;width:8px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-2</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">8px</div>
    <div style="height:14px;width:16px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-3</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">12px</div>
    <div style="height:14px;width:24px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-4</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">16px</div>
    <div style="height:14px;width:32px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-5</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">20px</div>
    <div style="height:14px;width:40px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-6</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">24px</div>
    <div style="height:14px;width:48px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-8</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">32px</div>
    <div style="height:14px;width:64px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-10</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">40px</div>
    <div style="height:14px;width:80px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-12</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">48px</div>
    <div style="height:14px;width:96px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
  <div style="display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px">
    <div style="font-family:var(--font-mono);font-size:11px;color:#64748B">--space-16</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:#94A3B8">64px</div>
    <div style="height:14px;width:128px;background:linear-gradient(90deg,#2563EB,#38BDF8);border-radius:3px"></div>
  </div>
</div></body></html>
