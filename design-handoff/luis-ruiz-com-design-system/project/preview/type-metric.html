<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Metric numerals</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
  <div style="background:#0F172A;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px"><div style="font-size:11px;color:#94A3B8;font-weight:500">Tracked revenue</div><div style="font-size:44px;font-weight:600;letter-spacing:-0.02em;color:#F8FAFC;line-height:1.1;margin-top:8px">$24.8k</div></div>
  <div style="background:#0F172A;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px"><div style="font-size:11px;color:#94A3B8;font-weight:500">Open leads</div><div style="font-size:44px;font-weight:600;letter-spacing:-0.02em;color:#F8FAFC;line-height:1.1;margin-top:8px">12</div></div>
  <div style="background:#0F172A;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px"><div style="font-size:11px;color:#94A3B8;font-weight:500">Active projects</div><div style="font-size:44px;font-weight:600;letter-spacing:-0.02em;color:#F8FAFC;line-height:1.1;margin-top:8px">7</div></div>
</div>
<div style="margin-top:10px;font-family:var(--font-mono);font-size:11px;color:#64748B">44px · 600 · -0.02em — dashboard KPI numerals</div></body></html>
