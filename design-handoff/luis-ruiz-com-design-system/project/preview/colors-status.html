<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Status palette</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
  <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(34,197,94,.12);color:#22C55E;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#22C55E"></span>active</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(234,179,8,.14);color:#EAB308;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#EAB308"></span>paused</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(239,68,68,.12);color:#EF4444;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#EF4444"></span>blocked</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(56,189,248,.14);color:#38BDF8;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#38BDF8"></span>shipped</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(167,139,250,.14);color:#A78BFA;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#A78BFA"></span>testing</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(100,116,139,.18);color:#64748B;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#64748B"></span>archived</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(94,234,212,.14);color:#5EEAD4;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#5EEAD4"></span>new</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(56,189,248,.14);color:#38BDF8;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#38BDF8"></span>contacted</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(129,140,248,.14);color:#818CF8;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#818CF8"></span>qualified</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(192,132,252,.14);color:#C084FC;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#C084FC"></span>proposal sent</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(52,211,153,.14);color:#34D399;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#34D399"></span>deposit paid</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(251,191,36,.14);color:#FBBF24;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#FBBF24"></span>in progress</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(34,197,94,.14);color:#22C55E;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#22C55E"></span>delivered</div><div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:rgba(148,163,184,.18);color:#94A3B8;font-size:11px;font-weight:600;letter-spacing:.02em"><span style="width:6px;height:6px;border-radius:50%;background:#94A3B8"></span>lost</div>
</div></body></html>
