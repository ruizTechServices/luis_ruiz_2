<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=700"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#020617;color:#F8FAFC;font-family:var(--font-sans);}
  body{padding:24px;width:700px;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
  .grid{display:grid;gap:12px;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:14px 14px 16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);min-height:96px;}
  .swatch .name{font-size:12px;font-weight:600;letter-spacing:.02em;color:#F8FAFC;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.02em;}
  .swatch.lt{color:#0F172A;}
  .swatch.lt .name{color:#0F172A;}
  .swatch.lt .hex{color:rgba(15,23,42,.6);}
  .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5EEAD4;font-weight:600;margin-bottom:10px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style>
</head><body>
<div class="label">Badges &amp; pills</div>
<div style="display:flex;flex-wrap:wrap;gap:8px">
  <span class="rt-badge" style="background:rgba(34,197,94,.12);color:#22C55E"><span style="width:6px;height:6px;border-radius:50%;background:#22C55E"></span>active</span><span class="rt-badge" style="background:rgba(56,189,248,.14);color:#38BDF8"><span style="width:6px;height:6px;border-radius:50%;background:#38BDF8"></span>shipped</span><span class="rt-badge" style="background:rgba(234,179,8,.14);color:#EAB308"><span style="width:6px;height:6px;border-radius:50%;background:#EAB308"></span>paused</span><span class="rt-badge" style="background:rgba(239,68,68,.12);color:#EF4444"><span style="width:6px;height:6px;border-radius:50%;background:#EF4444"></span>blocked</span><span class="rt-badge" style="background:rgba(167,139,250,.14);color:#A78BFA"><span style="width:6px;height:6px;border-radius:50%;background:#A78BFA"></span>testing</span><span class="rt-badge" style="background:rgba(52,211,153,.14);color:#34D399"><span style="width:6px;height:6px;border-radius:50%;background:#34D399"></span>Public-safe</span><span class="rt-badge" style="background:rgba(94,234,212,.12);color:#5EEAD4"><span style="width:6px;height:6px;border-radius:50%;background:#5EEAD4"></span>Owner only</span><span class="rt-badge" style="background:rgba(148,163,184,.18);color:#94A3B8"><span style="width:6px;height:6px;border-radius:50%;background:#94A3B8"></span>Placeholder</span>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px">
  <span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">active</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">paused</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">blocked</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">shipped</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">testing</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">archived</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">new</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">contacted</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">qualified</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">proposal sent</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">deposit paid</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">in progress</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">delivered</span><span style="padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.08);color:#CBD5E1;font-size:11px;font-weight:500">lost</span>
</div></body></html>
